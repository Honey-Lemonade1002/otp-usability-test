<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTP Usability Test</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <h1>OTP 驗證碼易用性測試</h1>

    <p>請選擇一種 OTP 顯示模式進行測試。每次測試需連續完成 10 題。</p>

    <div class="button-group">
      <button onclick="showOTP('A')">模式 A</button>
      <button onclick="showOTP('B')">模式 B</button>
      <button onclick="showOTP('C')">模式 C</button>
      <button onclick="showOTP('random')">隨機模式</button>
    </div>

    <div class="test-area">
      <h2>目前顯示的驗證碼</h2>
      <div id="otp-display">尚未選擇模式</div>

      <input 
        type="text" 
        id="user-input" 
        placeholder="請輸入驗證碼"
        maxlength="6"
      />

      <button onclick="checkAnswer()">送出答案</button>

      <p id="result-message"></p>
    </div>

    <div class="history-section">
      <h2>測試紀錄</h2>

      <table>
        <thead>
          <tr>
            <th>次數</th>
            <th>模式</th>
            <th>平均時間</th>
            <th>總錯誤次數</th>
          </tr>
        </thead>

        <tbody id="history-body">
          <tr id="empty-row">
            <td colspan="4">尚無測試紀錄</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
